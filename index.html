<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meal Planner</title>
<style>
:root{--bg:#f6f3ee;--card:#fffaf4;--text:#171717;--muted:#777}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:16px;max-width:850px;margin:auto}
h1{text-align:center;font-size:38px;margin:28px 0 18px}
.nav{display:flex;gap:8px;position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:10}
.nav button{flex:1;background:#e7ded4;color:#111}
.nav button.active{background:#111;color:white}
.screen{display:none}.screen.active{display:block}
.card{background:var(--card);border-radius:22px;padding:18px;margin:14px 0;box-shadow:0 8px 20px rgba(0,0,0,.07);border-left:10px solid var(--dayColor,#ddd)}
.day{font-size:28px;font-weight:900;margin-bottom:12px}
label{font-weight:800;font-size:14px}
input,textarea,select{width:100%;box-sizing:border-box;padding:14px;margin:7px 0 13px;border:1px solid #ddd;border-radius:14px;font-size:16px;background:white}
button{width:100%;padding:14px;border:0;border-radius:16px;background:#111;color:white;font-size:16px;font-weight:800;margin:7px 0}
.clear{background:#777}.delete{background:#b00020}
.row{display:flex;gap:8px;align-items:center}.row input{margin:0;flex:1}
.plus{width:54px;height:54px;font-size:28px;border-radius:18px;padding:0}
.grocery-item,.fav-item{display:flex;gap:10px;align-items:center;background:white;padding:12px;border-radius:14px;margin:8px 0}
.mini{font-size:13px;color:var(--muted)}.small-btn{width:auto;padding:8px 10px;margin:0}
.category{background:white;border-radius:16px;margin:10px 0;overflow:hidden;border:1px solid #eadfd2}
.category-header{padding:14px;font-weight:900;font-size:18px;display:flex;justify-content:space-between;align-items:center;background:#f3e9dd}
.category-body{display:none;padding:10px}.category.open .category-body{display:block}
.meal-option{background:#fff;padding:14px;border-radius:14px;margin:8px 0;border:1px solid #eee;font-weight:800}
.sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100}
.sheet{position:fixed;left:0;right:0;bottom:0;background:var(--bg);border-radius:26px 26px 0 0;padding:18px;max-height:78vh;overflow:auto;z-index:101;box-shadow:0 -10px 30px rgba(0,0,0,.2)}
.sheet-close{background:#777}.pill{display:inline-block;background:#eee1d4;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;margin-top:5px}
.status{text-align:center;font-size:13px;color:#777;margin-top:-8px;margin-bottom:8px}
.check-row{display:flex;align-items:center;gap:10px;background:white;border-radius:14px;padding:12px;margin:8px 0}
.check-row input{width:auto;margin:0}
.section-title{font-weight:900;font-size:18px;margin-top:14px}
</style>
</head>
<body>

<h1>🍽️ Meal Planner</h1>
<div class="status" id="status">Connecting...</div>

<div class="nav">
<button id="planBtn" class="active" onclick="showScreen('plan')">Plan</button>
<button id="favBtn" onclick="showScreen('favorites')">Favorites</button>
<button id="groceryBtn" onclick="showScreen('grocery')">Groceries</button>
</div>

<div id="plan" class="screen active">
<div id="planner"></div>
<button onclick="saveData(); alert('Saved!')">Save Everything</button>
<button class="clear" onclick="clearWeek()">Clear Week</button>
</div>

<div id="favorites" class="screen">
<div class="card">
<h2>⭐ Add Favorite Meal</h2>
<label>Meal Name</label><input id="favName" placeholder="Chicken tacos">
<label>Category</label>
<select id="favCategory">
<option>Mexican</option><option>Pasta</option><option>Chicken</option><option>Beef</option>
<option>Grill / BBQ</option><option>Soup / Chili</option><option>Salad / Bowls</option>
<option>Takeout / Easy</option><option>Other</option>
</select>
<label>Notes / Recipe Link</label><textarea id="favNotes" rows="3"></textarea>
<label>Costco Items</label><textarea id="favCostco" rows="3" placeholder="Chicken&#10;Tortillas"></textarea>
<label>Macey's Items</label><textarea id="favMaceys" rows="3" placeholder="Lettuce&#10;Salsa&#10;Cilantro"></textarea>
<button onclick="addFavorite()">Save Favorite Meal</button>
</div>
<div class="card"><h2>Saved Favorite Meals</h2><div id="favoritesList"></div></div>
</div>

<div id="grocery" class="screen">
<div class="card">
<h2>🛒 Costco List</h2>
<input id="costcoItem" placeholder="Add Costco item">
<button onclick="addGrocery('costco')">Add Costco Item</button>
<div id="costcoList"></div>
</div>
<div class="card">
<h2>🛒 Macey's List</h2>
<input id="maceysItem" placeholder="Add Macey's item">
<button onclick="addGrocery('maceys')">Add Macey's Item</button>
<div id="maceysList"></div>
</div>
<div class="card">
<h2>📝 Meal Prep Notes</h2>
<textarea id="notes" rows="5" placeholder="Prep chicken, thaw meat, chop veggies..."></textarea>
</div>
<button onclick="saveData(); alert('Saved!')">Save Everything</button>
<button class="clear" onclick="clearGroceries()">Clear Grocery Lists</button>
</div>

<div id="mealSheetBackdrop" class="sheet-backdrop" onclick="closeMealPicker()">
<div class="sheet" onclick="event.stopPropagation()">
<h2>Choose a favorite meal</h2>
<p class="mini">Tap a meal to add it to the selected day.</p>
<div id="mealPickerList"></div>
<button class="sheet-close" onclick="closeMealPicker()">Cancel</button>
</div>
</div>

<div id="grocerySheetBackdrop" class="sheet-backdrop" onclick="closeGroceryPicker()">
<div class="sheet" onclick="event.stopPropagation()">
<h2 id="groceryPickerTitle">Add groceries?</h2>
<p class="mini">Choose which items you want added to the lists.</p>
<button onclick="selectAllGroceryChecks()">Select All</button>
<button class="clear" onclick="clearAllGroceryChecks()">Clear All</button>
<div id="groceryPickerList"></div>
<button onclick="addSelectedGroceries()">Add Selected</button>
<button class="sheet-close" onclick="closeGroceryPicker()">Cancel</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA96_EkShBRF5rfQk8x5NK956aTs2jbgqfQ",
authDomain: "meal-planner-70aef.firebaseapp.com",
projectId: "meal-planner-70aef",
storageBucket: "meal-planner-70aef.firebasestorage.app",
messagingSenderId: "77553154168",
appId: "1:77553154168:web:af336eb70ff9b09b5c958d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const sharedDoc = doc(db, "households", "mikayla-jesse");

const baseDays=[
{day:"Sunday",color:"#ffc6ff"},
{day:"Monday",color:"#ffd6a5"},
{day:"Tuesday",color:"#fdffb6"},
{day:"Wednesday",color:"#caffbf"},
{day:"Thursday",color:"#9bf6ff"},
{day:"Friday",color:"#a0c4ff"},
{day:"Saturday",color:"#bdb2ff"}
];

const todayIndex=new Date().getDay();
const days=[...baseDays.slice(todayIndex),...baseDays.slice(0,todayIndex)];

let state={plan:{},costco:[],maceys:[],favorites:[],notes:""};
let selectedDay=null;
let selectedFavoriteForGroceries=null;
let loading=true;
let saveTimer=null;

const randomFoodEmojis=["🍽️","🥘","🍲","🍛","🍜","🍝","🥗","🌮","🌯","🍕","🍔","🍟","🥪","🥙","🍗","🥩","🍖","🍤","🍣","🍱","🥟","🍚","🍙","🥐","🧀","🥔","🥕","🥦"];

function randomFoodEmoji(){return randomFoodEmojis[Math.floor(Math.random()*randomFoodEmojis.length)];}

function getMealEmoji(meal){
meal=(meal||"").toLowerCase();
if(meal.includes("leftover"))return "🥡";
if(meal.includes("takeout")||meal.includes("take out"))return "🥢";
if(meal.includes("date night"))return "🥂";
if(meal.includes("costco pizza"))return "🍕";
if(meal.includes("crockpot")||meal.includes("crock pot")||meal.includes("slow cooker"))return "🥘";
if(meal.includes("smoker")||meal.includes("smoked"))return "🔥";
if(meal.includes("grill")||meal.includes("grilled"))return "♨️";
if(meal.includes("taco")||meal.includes("burrito")||meal.includes("quesadilla")||meal.includes("mexican")||meal.includes("cafe rio"))return "🌮";
if(meal.includes("pasta")||meal.includes("spaghetti")||meal.includes("alfredo")||meal.includes("lasagna")||meal.includes("ravioli"))return "🍝";
if(meal.includes("pizza"))return "🍕";
if(meal.includes("steak")||meal.includes("beef")||meal.includes("roast"))return "🥩";
if(meal.includes("chicken")||meal.includes("wings"))return "🍗";
if(meal.includes("salmon")||meal.includes("fish")||meal.includes("tilapia"))return "🐟";
if(meal.includes("salad"))return "🥗";
if(meal.includes("soup")||meal.includes("chili")||meal.includes("stew"))return "🍲";
if(meal.includes("burger")||meal.includes("sloppy joe"))return "🍔";
if(meal.includes("sushi"))return "🍣";
if(meal.includes("breakfast")||meal.includes("eggs")||meal.includes("pancake"))return "🍳";
if(meal.includes("rice")||meal.includes("stir fry")||meal.includes("teriyaki"))return "🍚";
if(meal.includes("sandwich")||meal.includes("sub"))return "🥪";
if(meal.includes("hot dog"))return "🌭";
if(meal.includes("bbq")||meal.includes("ribs"))return "🍖";
if(meal.includes("shrimp"))return "🍤";
if(meal.includes("potato"))return "🥔";
if(meal.trim()==="")return "🍽️";
return randomFoodEmoji();
}

const planner=document.getElementById("planner");
days.forEach(item=>{
planner.innerHTML+=`
<div class="card" style="--dayColor:${item.color}">
<div class="day"><span id="${item.day}-emoji">🍽️</span> ${item.day}</div>
<label>Dinner</label>
<div class="row">
<input id="${item.day}-dinner" placeholder="Type dinner manually" oninput="updateEmoji('${item.day}'); queueSave();">
<button type="button" class="plus" onclick="openMealPicker('${item.day}')">+</button>
</div>
<label>Notes</label>
<textarea id="${item.day}-notes" rows="2" placeholder="Recipe link, sides, prep notes..." oninput="queueSave()"></textarea>
</div>`;
});

function pullFromInputs(){
days.forEach(item=>{
state.plan[item.day]={
dinner:document.getElementById(item.day+"-dinner").value,
notes:document.getElementById(item.day+"-notes").value
};
});
state.notes=document.getElementById("notes").value;
}

async function saveData(){
if(loading)return;
pullFromInputs();
await setDoc(sharedDoc,state,{merge:false});
document.getElementById("status").textContent="Synced";
}

function queueSave(){
clearTimeout(saveTimer);
saveTimer=setTimeout(saveData,500);
}

function applyStateToUI(){
loading=true;
days.forEach(item=>{
let meal=state.plan?.[item.day]?.dinner||"";
let notes=state.plan?.[item.day]?.notes||"";
document.getElementById(item.day+"-dinner").value=meal;
document.getElementById(item.day+"-notes").value=notes;
updateEmoji(item.day);
});
document.getElementById("notes").value=state.notes||"";
renderGroceries();
renderFavorites();
loading=false;
}

onSnapshot(sharedDoc, async snap=>{
if(snap.exists()){
state=snap.data();
state.plan=state.plan||{};
state.costco=state.costco||[];
state.maceys=state.maceys||[];
state.favorites=state.favorites||[];
state.notes=state.notes||"";
document.getElementById("status").textContent="Live sync on";
applyStateToUI();
} else {
document.getElementById("status").textContent="Creating shared planner...";
await setDoc(sharedDoc,state);
}
});

function showScreen(screen){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(screen).classList.add("active");
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
if(screen==="plan")document.getElementById("planBtn").classList.add("active");
if(screen==="favorites")document.getElementById("favBtn").classList.add("active");
if(screen==="grocery")document.getElementById("groceryBtn").classList.add("active");
renderFavorites();renderGroceries();
}

function openMealPicker(day){
selectedDay=day;
if(state.favorites.length===0){alert("Add favorite meals first.");showScreen("favorites");return;}
renderMealPicker();
document.getElementById("mealSheetBackdrop").style.display="block";
}

function closeMealPicker(){document.getElementById("mealSheetBackdrop").style.display="none";}

function groupedFavorites(){
let groups={};
state.favorites.forEach((f,i)=>{
let cat=f.category||"Other";
if(!groups[cat])groups[cat]=[];
groups[cat].push({...f,index:i});
});
return groups;
}

function safeId(s){return s.replaceAll(" ","-").replaceAll("/","-").replaceAll("&","and");}

function renderMealPicker(){
let box=document.getElementById("mealPickerList");
let groups=groupedFavorites();
box.innerHTML="";
Object.keys(groups).sort().forEach(cat=>{
let id="picker-"+safeId(cat);
let body="";
groups[cat].forEach(f=>{
body+=`<div class="meal-option" onclick="selectFavorite(${f.index})">
${getMealEmoji(f.name)} ${f.name}
<div class="mini">${f.notes||""}</div>
<span class="pill">${cat}</span>
</div>`;
});
box.innerHTML+=`<div class="category open" id="${id}">
<div class="category-header" onclick="toggleCategory('${id}')"><span>${cat}</span><span>⌄</span></div>
<div class="category-body">${body}</div>
</div>`;
});
}

function toggleCategory(id){document.getElementById(id).classList.toggle("open");}

function selectFavorite(index){
let fav=state.favorites[index];
if(!fav||!selectedDay)return;

document.getElementById(selectedDay+"-dinner").value=fav.name;
document.getElementById(selectedDay+"-notes").value=fav.notes||"";
updateEmoji(selectedDay);
closeMealPicker();

selectedFavoriteForGroceries=fav;

let hasGroceries=(fav.costco&&fav.costco.length)||(fav.maceys&&fav.maceys.length);
if(hasGroceries){
openGroceryPicker(fav);
} else {
saveData();
}
}

function openGroceryPicker(fav){
document.getElementById("groceryPickerTitle").textContent=getMealEmoji(fav.name)+" "+fav.name+" Groceries";
let box=document.getElementById("groceryPickerList");
let html="";

if((fav.costco||[]).length){
html+=`<div class="section-title">🛒 Costco</div>`;
fav.costco.forEach((item,i)=>{
html+=`<label class="check-row">
<input type="checkbox" class="grocery-check" data-store="costco" data-item="${escapeHtml(item)}" checked>
<span>${escapeHtml(item)}</span>
</label>`;
});
}

if((fav.maceys||[]).length){
html+=`<div class="section-title">🛒 Macey's</div>`;
fav.maceys.forEach((item,i)=>{
html+=`<label class="check-row">
<input type="checkbox" class="grocery-check" data-store="maceys" data-item="${escapeHtml(item)}" checked>
<span>${escapeHtml(item)}</span>
</label>`;
});
}

box.innerHTML=html;
document.getElementById("grocerySheetBackdrop").style.display="block";
}

function closeGroceryPicker(){
document.getElementById("grocerySheetBackdrop").style.display="none";
selectedFavoriteForGroceries=null;
saveData();
}

function selectAllGroceryChecks(){
document.querySelectorAll(".grocery-check").forEach(cb=>cb.checked=true);
}

function clearAllGroceryChecks(){
document.querySelectorAll(".grocery-check").forEach(cb=>cb.checked=false);
}

function addSelectedGroceries(){
document.querySelectorAll(".grocery-check:checked").forEach(cb=>{
let store=cb.dataset.store;
let item=cb.dataset.item;
state[store].push({text:item,done:false});
});
document.getElementById("grocerySheetBackdrop").style.display="none";
selectedFavoriteForGroceries=null;
saveData();
renderGroceries();
}

function escapeHtml(text){
return String(text)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")
.replaceAll('"',"&quot;")
.replaceAll("'","&#039;");
}

function updateEmoji(day){
let meal=document.getElementById(day+"-dinner").value;
document.getElementById(day+"-emoji").textContent=getMealEmoji(meal);
}

function addFavorite(){
let name=document.getElementById("favName").value.trim();
if(!name){alert("Add a meal name.");return;}
let category=document.getElementById("favCategory").value;
let notes=document.getElementById("favNotes").value.trim();
let c=document.getElementById("favCostco").value.split("\n").map(x=>x.trim()).filter(Boolean);
let m=document.getElementById("favMaceys").value.split("\n").map(x=>x.trim()).filter(Boolean);
state.favorites.push({name,category,notes,costco:c,maceys:m});
document.getElementById("favName").value="";
document.getElementById("favNotes").value="";
document.getElementById("favCostco").value="";
document.getElementById("favMaceys").value="";
saveData();renderFavorites();alert("Favorite saved!");
}

function deleteFavorite(i){
if(!confirm("Delete this favorite meal?"))return;
state.favorites.splice(i,1);
saveData();renderFavorites();
}

function renderFavorites(){
let box=document.getElementById("favoritesList");
if(!box)return;
if(!state.favorites.length){box.innerHTML="<p class='mini'>No favorites saved yet.</p>";return;}
let groups=groupedFavorites();
box.innerHTML="";
Object.keys(groups).sort().forEach(cat=>{
let id="fav-"+safeId(cat);
let body="";
groups[cat].forEach(f=>{
body+=`<div class="fav-item">
<span style="font-size:26px">${getMealEmoji(f.name)}</span>
<div style="flex:1">
<strong>${escapeHtml(f.name)}</strong>
<div class="mini">${escapeHtml(f.notes||"")}</div>
<div class="mini">Costco: ${(f.costco||[]).map(escapeHtml).join(", ")||"none"}</div>
<div class="mini">Macey's: ${(f.maceys||[]).map(escapeHtml).join(", ")||"none"}</div>
</div>
<button type="button" class="small-btn delete" onclick="deleteFavorite(${f.index})">x</button>
</div>`;
});
box.innerHTML+=`<div class="category open" id="${id}">
<div class="category-header" onclick="toggleCategory('${id}')"><span>${escapeHtml(cat)}</span><span>⌄</span></div>
<div class="category-body">${body}</div>
</div>`;
});
}

function addGrocery(store){
let inputId=store==="costco"?"costcoItem":"maceysItem";
let item=document.getElementById(inputId).value.trim();
if(!item)return;
state[store].push({text:item,done:false});
document.getElementById(inputId).value="";
saveData();renderGroceries();
}

function toggleGrocery(store,i){
state[store][i].done=!state[store][i].done;
saveData();renderGroceries();
}

function deleteGrocery(store,i){
state[store].splice(i,1);
saveData();renderGroceries();
}

function renderList(store){
let list=state[store]||[];
let elementId=store==="costco"?"costcoList":"maceysList";
let html="";
list.forEach((g,i)=>{
html+=`<div class="grocery-item">
<input type="checkbox" style="width:auto" ${g.done?"checked":""} onchange="toggleGrocery('${store}',${i})">
<span style="flex:1;text-decoration:${g.done?"line-through":"none"}">${escapeHtml(g.text)}</span>
<button type="button" class="small-btn" onclick="deleteGrocery('${store}',${i})">x</button>
</div>`;
});
document.getElementById(elementId).innerHTML=html;
}

function renderGroceries(){renderList("costco");renderList("maceys");}

function clearWeek(){
if(!confirm("Clear this week's meal plan?"))return;
days.forEach(item=>{
state.plan[item.day]={dinner:"",notes:""};
document.getElementById(item.day+"-dinner").value="";
document.getElementById(item.day+"-notes").value="";
updateEmoji(item.day);
});
saveData();
}

function clearGroceries(){
if(!confirm("Clear Costco and Macey's lists?"))return;
state.costco=[];state.maceys=[];
saveData();renderGroceries();
}

window.showScreen=showScreen;
window.openMealPicker=openMealPicker;
window.closeMealPicker=closeMealPicker;
window.toggleCategory=toggleCategory;
window.selectFavorite=selectFavorite;
window.updateEmoji=updateEmoji;
window.addFavorite=addFavorite;
window.deleteFavorite=deleteFavorite;
window.addGrocery=addGrocery;
window.toggleGrocery=toggleGrocery;
window.deleteGrocery=deleteGrocery;
window.saveData=saveData;
window.clearWeek=clearWeek;
window.clearGroceries=clearGroceries;
window.queueSave=queueSave;
window.closeGroceryPicker=closeGroceryPicker;
window.selectAllGroceryChecks=selectAllGroceryChecks;
window.clearAllGroceryChecks=clearAllGroceryChecks;
window.addSelectedGroceries=addSelectedGroceries;
</script>

</body>
</html>
