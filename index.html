<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meal Planner</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f6f6f6;margin:0;padding:18px;max-width:800px;margin:auto}
h1{text-align:center;font-size:38px}
.card{background:white;border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 4px 12px #0001}
.day{font-size:26px;font-weight:800;margin-bottom:10px}
label{font-weight:700;font-size:14px}
input,textarea{width:100%;box-sizing:border-box;padding:12px;margin:6px 0 12px;border:1px solid #ddd;border-radius:10px;font-size:16px}
button{width:100%;padding:14px;border:0;border-radius:12px;background:#111;color:white;font-size:17px;font-weight:700;margin:8px 0}
.clear{background:#777}
.grocery-item{display:flex;gap:10px;align-items:center;background:white;padding:10px;border-radius:10px;margin:6px 0}
</style>
</head>
<body>

<h1>🍽️ Meal Planner</h1>

<div id="planner"></div>

<div class="card">
<h2>🛒 Grocery List</h2>
<input id="newItem" placeholder="Add grocery item">
<button onclick="addGrocery()">Add Item</button>
<div id="groceryList"></div>
</div>

<div class="card">
<h2>📝 Meal Prep Notes</h2>
<textarea id="notes" rows="5" placeholder="Prep chicken, thaw meat, chop veggies..."></textarea>
</div>

<button onclick="saveData()">Save Everything</button>
<button class="clear" onclick="clearAll()">Clear Week</button>

<script>
const days=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const planner=document.getElementById("planner");

days.forEach(day=>{
planner.innerHTML+=`
<div class="card">
<div class="day">${day}</div>
<label>Breakfast</label><input id="${day}-breakfast">
<label>Lunch</label><input id="${day}-lunch">
<label>Dinner</label><input id="${day}-dinner">
<label>Notes</label><textarea id="${day}-notes" rows="2"></textarea>
</div>`;
});

let groceries=JSON.parse(localStorage.getItem("groceries")||"[]");

function saveData(){
days.forEach(day=>{
["breakfast","lunch","dinner","notes"].forEach(type=>{
let id=`${day}-${type}`;
localStorage.setItem(id,document.getElementById(id).value);
});
});
localStorage.setItem("notes",document.getElementById("notes").value);
localStorage.setItem("groceries",JSON.stringify(groceries));
alert("Saved!");
}

function loadData(){
days.forEach(day=>{
["breakfast","lunch","dinner","notes"].forEach(type=>{
let id=`${day}-${type}`;
document.getElementById(id).value=localStorage.getItem(id)||"";
});
});
document.getElementById("notes").value=localStorage.getItem("notes")||"";
renderGroceries();
}

function addGrocery(){
let item=document.getElementById("newItem").value.trim();
if(!item)return;
groceries.push({text:item,done:false});
document.getElementById("newItem").value="";
saveData();
renderGroceries();
}

function toggleGrocery(i){
groceries[i].done=!groceries[i].done;
saveData();
renderGroceries();
}

function deleteGrocery(i){
groceries.splice(i,1);
saveData();
renderGroceries();
}

function renderGroceries(){
let list=document.getElementById("groceryList");
list.innerHTML="";
groceries.forEach((g,i)=>{
list.innerHTML+=`
<div class="grocery-item">
<input type="checkbox" style="width:auto" ${g.done?"checked":""} onchange="toggleGrocery(${i})">
<span style="flex:1;text-decoration:${g.done?"line-through":"none"}">${g.text}</span>
<button style="width:auto;padding:8px 10px" onclick="deleteGrocery(${i})">x</button>
</div>`;
});
}

function clearAll(){
if(!confirm("Clear the whole week?"))return;
localStorage.clear();
groceries=[];
loadData();
}

loadData();
</script>

</body>
</html>
